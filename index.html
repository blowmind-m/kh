<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Közös Számláló és Űrlap</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; color: #333; max-width: 600px; margin: 40px auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); background-color: white; }
        h2 { border-bottom: 2px solid #007BFF; padding-bottom: 5px; margin-top: 30px; }
        .stat-box { background-color: #e9ecef; padding: 15px; border-radius: 5px; font-size: 18px; margin-bottom: 20px; }
        .stat-box span { font-weight: bold; color: #007BFF; }
        form { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; color: white; background-color: #007BFF; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        .admin-panel { background-color: #fff3cd; padding: 15px; border-radius: 5px; border: 1px solid #ffeeba; }
        .btn-download { background-color: #28a745; }
        .btn-download:hover { background-color: #218838; }
        .btn-reset { background-color: #dc3545; margin-top: 10px; width: 100%; }
        .btn-reset:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <h2>Élő Statisztika</h2>
    <div class="stat-box">
        <p>Összes oldal megnyitás: <span id="visitCount">Betöltés...</span></p>
        <p>Összes űrlap kitöltés: <span id="submitCount">Betöltés...</span></p>
    </div>

    <h2>Név megadása</h2>
    <form id="nameForm">
        <input type="text" id="nameInput" placeholder="Írd be a neved..." required>
        <button type="submit">Küldés</button>
    </form>

    <h2>Adminisztráció</h2>
    <div class="admin-panel">
        <p>A gombok mindenki számára láthatók, de éles adatokkal dolgoznak.</p>
        <button class="btn-download" onclick="window.downloadFile()">Nevek letöltése (.txt)</button>
        <button class="btn-reset" onclick="window.resetData()">Minden adat nullázása</button>
    </div>

    <!-- Firebase SDK betöltése modulként -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction, push, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // =================================================================
        // IDE MÁSOLD BE A SAJÁT FIREBASE CONFIG ADATAIDAT!
         const firebaseConfig = {
           apiKey: "AIzaSyDEr5_opzmvZR1AoEs6diO-VeffZ0IqrVQ",
           authDomain: "kaha-5679a.firebaseapp.com",
           databaseURL: "https://kaha-5679a-default-rtdb.europe-west1.firebasedatabase.app",
           projectId: "kaha-5679a",
           storageBucket: "kaha-5679a.firebasestorage.app",
           messagingSenderId: "802575908506",
          appId: "1:802575908506:web:08dc30dd1529edcd5f2923"
          };

        // =================================================================

        // Firebase inicializálása
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Adatbázis hivatkozások
        const visitsRef = ref(db, 'stats/visits');
        const submitsRef = ref(db, 'stats/submits');
        const namesRef = ref(db, 'names');

        // 1. Oldal megnyitás számláló növelése biztonságosan (tranzakcióval)
        runTransaction(visitsRef, (currentData) => {
            return (currentData || 0) + 1;
        });

        // 2. Számlálók valós idejű figyelése (ha más megnyitja, nálad is frissül!)
        onValue(visitsRef, (snapshot) => {
            document.getElementById('visitCount').innerText = snapshot.val() || 0;
        });
        onValue(submitsRef, (snapshot) => {
            document.getElementById('submitCount').innerText = snapshot.val() || 0;
        });

        // 3. Űrlap beküldése
        document.getElementById('nameForm').addEventListener('submit', (event) => {
            event.preventDefault();
            const nameInput = document.getElementById('nameInput');
            const newName = nameInput.value.trim();
            
            if(newName !== "") {
                // Név feltöltése az adatbázisba
                push(namesRef, newName);
                
                // Kitöltés számláló növelése
                runTransaction(submitsRef, (currentData) => {
                    return (currentData || 0) + 1;
                });
                
                nameInput.value = '';
                alert("Név sikeresen elmentve a felhőbe!");
            }
        });

        // 4. Nevek letöltése (elérhetővé tesszük a HTML számára a window objektumon)
        window.downloadFile = async function() {
            const snapshot = await get(namesRef);
            if (snapshot.exists()) {
                // Adatok kinyerése a Firebase formátumból
                const namesObj = snapshot.val();
                const namesArray = Object.values(namesObj);
                
                // Fájl generálása
                const textContent = namesArray.join('\n');
                const blob = new Blob([textContent], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = 'kitoltott_nevek.txt';
                document.body.appendChild(a);
                a.click();
                
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } else {
                alert("Nincsenek letölthető nevek az adatbázisban.");
            }
        };

        // 5. Adatok nullázása
        window.resetData = function() {
            if(confirm("Biztosan nullázod az egész adatbázist mindenki számára?")) {
                // Minden hivatkozás alaphelyzetbe állítása
                set(ref(db, '/'), {
                    stats: { visits: 0, submits: 0 },
                    names: null
                }).then(() => {
                    alert("Adatbázis nullázva!");
                });
            }
        };
    </script>
</body>
</html>
